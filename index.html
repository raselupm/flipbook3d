<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipBook3D — Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="dist/flipbook3d.css">
    <style>
        /* ============================================
           DEMO PAGE STYLES
        ============================================ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0d0d18;
            background-image:
                    radial-gradient(ellipse at 20% 30%, rgba(30,20,60,0.8) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 70%, rgba(20,40,30,0.6) 0%, transparent 60%),
                    url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 60L60 0M-5 5L5-5M55 65L65 55' stroke='%23ffffff' stroke-width='0.3' opacity='0.03'/%3E%3C/svg%3E");
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 32px;
        }

        .demo-header {
            text-align: center;
        }

        .demo-title {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            font-size: clamp(28px, 5vw, 52px);
            color: #f0e8d8;
            letter-spacing: 0.04em;
            font-weight: normal;
            line-height: 1.2;
        }

        .demo-title span {
            color: #e8c87d;
            font-style: italic;
        }

        .demo-subtitle {
            font-size: 13px;
            color: rgba(240,232,216,0.45);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 8px;
            font-family: 'Georgia', serif;
        }

        .upload-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .upload-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: rgba(232, 200, 125, 0.08);
            border: 1.5px dashed rgba(232, 200, 125, 0.35);
            border-radius: 8px;
            color: #e8c87d;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.06em;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
        }

        .upload-label:hover {
            background: rgba(232, 200, 125, 0.14);
            border-color: rgba(232, 200, 125, 0.6);
        }

        #pdf-input { display: none; }

        .demo-hint {
            font-size: 12px;
            color: rgba(240,232,216,0.3);
            letter-spacing: 0.08em;
            text-align: center;
        }

        /* Mute button */
        #mute-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            background: rgba(10,10,20,0.85);
            border: 1px solid rgba(232,200,125,0.25);
            color: var(--fb-accent, #e8c87d);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s, border-color 0.2s, opacity 0.2s;
            opacity: 0.75;
        }
        #mute-btn:hover { opacity: 1; border-color: rgba(232,200,125,0.6); }
        #mute-btn.muted { color: rgba(240,232,216,0.35); border-color: rgba(255,255,255,0.1); }

        /* Keyboard hint */
        .kb-hint {
            font-size: 12px;
            color: rgba(240,232,216,0.3);
            letter-spacing: 0.06em;
            display: flex;
            gap: 16px;
        }
        .kb-hint kbd {
            background: rgba(255,255,255,0.07);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.12);
            font-family: monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>

<header class="demo-header">
    <h1 class="demo-title">Flip<span>Book</span>3D</h1>
    <p class="demo-subtitle">JavaScript Plugin · PDF Support · Realistic Page Turns</p>
</header>

<div class="upload-zone">
    <label class="upload-label" for="pdf-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Upload PDF
    </label>
    <input type="file" id="pdf-input" accept="application/pdf">
    <p class="demo-hint">Upload a PDF to view it as a flip book</p>
</div>

<!-- Flipbook container -->
<div id="my-flipbook" style="display:none"></div>

<div class="kb-hint" id="kb-hint" style="display:none">
    <span><kbd>←</kbd> Previous</span>
    <span><kbd>→</kbd> Next</span>
    <span><kbd>Home</kbd> First</span>
    <span><kbd>End</kbd> Last</span>
</div>

<button id="mute-btn" title="Toggle sound">
    <svg id="mute-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <svg id="mute-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
</button>

<script src="dist/flipbook3d.js"></script>
<script>
    const fb = new FlipBook3D('#my-flipbook', {
        width: Math.min(860, window.innerWidth - 40),
        aspectRatio: 1.42,
        flipDuration: 650,
        scale: 1.8,
    });

    // PDF upload handler
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            document.getElementById('my-flipbook').style.display = '';
            document.getElementById('kb-hint').style.display = '';
            await fb.loadPDF(ev.target.result);
        };
        reader.readAsArrayBuffer(file);
    });

    // Mute button
    document.getElementById('mute-btn').addEventListener('click', () => {
        fb.muted = !fb.muted;
        const btn = document.getElementById('mute-btn');
        btn.classList.toggle('muted', fb.muted);
        document.getElementById('mute-icon-on').style.display = fb.muted ? 'none' : '';
        document.getElementById('mute-icon-off').style.display = fb.muted ? '' : 'none';
    });

    // Responsive resize
    window.addEventListener('resize', () => {
        // Skip during fullscreen — it manages its own resize via fullscreenchange
        if (document.fullscreenElement || document.webkitFullscreenElement || fb._fsChanging) return;
        const newW = Math.min(860, window.innerWidth - 40);
        if (Math.abs(newW - fb.totalW) > 40) {
            fb._resize(newW);
        }
    });
</script>
</body>
</html>
